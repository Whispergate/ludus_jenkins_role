---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

- name: Install Java
  ansible.builtin.apt:
    name: "{{ ludus_jenkins_java_packages }}"
    state: present

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Jenkins repository key
  ansible.builtin.include_tasks:
    file: download_file.yml
  vars:
    ludus_download_file_name: jenkins-keyring.asc
    ludus_download_file_url: https://pkg.jenkins.io/debian/jenkins.io-2023.key
    ludus_download_file_host_path: /etc/apt/keyrings
    ludus_download_file_force_download: true

- name: Add Jenkins apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/"
    state: present
    filename: jenkins

- name: Install Jenkins (latest)
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: true
  when: ludus_jenkins_version | length == 0

- name: Install Jenkins (specific version)
  ansible.builtin.apt:
    name: "jenkins={{ ludus_jenkins_version }}"
    state: present
    update_cache: true
  when: ludus_jenkins_version | length > 0

- name: Ensure Jenkins service override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/jenkins.service.d
    state: directory
    mode: "0755"

- name: Configure Jenkins port and arguments
  ansible.builtin.template:
    src: jenkins_override.conf.j2
    dest: /etc/systemd/system/jenkins.service.d/override.conf
    mode: "0644"
  notify: Restart Jenkins

- name: Enable and start Jenkins
  ansible.builtin.systemd:
    name: jenkins
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Jenkins to start
  ansible.builtin.uri:
    url: "http://localhost:{{ ludus_jenkins_http_port }}/login"
    method: GET
    status_code: 200
  register: jenkins_status
  retries: 30
  delay: 5
  until: jenkins_status.status == 200

- name: Install Jenkins plugins
  ansible.builtin.include_tasks:
    file: install_plugins.yml
  when: ludus_jenkins_plugins | length > 0

- name: Configure admin user
  ansible.builtin.include_tasks:
    file: configure_admin.yml
  when: ludus_jenkins_skip_setup_wizard
