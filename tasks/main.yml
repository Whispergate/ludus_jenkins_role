---
- name: Create Jenkins Docker network
  community.docker.docker_network:
    name: "{{ ludus_jenkins_docker_network }}"
    state: present

- name: Create Jenkins data volume
  community.docker.docker_volume:
    name: "{{ ludus_jenkins_data_volume }}"
    state: present

- name: Build Jenkins environment variables
  ansible.builtin.set_fact:
    ludus_jenkins_env:
      JAVA_OPTS: >-
        {% if ludus_jenkins_skip_setup_wizard %}-Djenkins.install.runSetupWizard=false{% endif %}
        {{ ludus_jenkins_java_args }}

- name: Run Jenkins container
  community.docker.docker_container:
    name: "{{ ludus_jenkins_container_name }}"
    image: "{{ ludus_jenkins_docker_image }}:{{ ludus_jenkins_docker_tag }}"
    state: started
    restart_policy: on-failure
    networks:
      - name: "{{ ludus_jenkins_docker_network }}"
    ports:
      - "{{ ludus_jenkins_http_port }}:8080"
      - "{{ ludus_jenkins_agent_port }}:50000"
    volumes:
      - "{{ ludus_jenkins_data_volume }}:{{ ludus_jenkins_home }}"
    env: "{{ ludus_jenkins_env }}"

- name: Wait for Jenkins to start
  ansible.builtin.uri:
    url: "http://localhost:{{ ludus_jenkins_http_port }}/login"
    method: GET
    status_code: 200
  register: jenkins_status
  retries: 30
  delay: 5
  until: jenkins_status.status == 200

- name: Install Jenkins plugins
  ansible.builtin.include_tasks:
    file: install_plugins.yml
  when: ludus_jenkins_plugins | length > 0

- name: Configure admin user
  ansible.builtin.include_tasks:
    file: configure_admin.yml
  when: ludus_jenkins_skip_setup_wizard
