---
- name: Install Jenkins plugins via CLI inside container
  community.docker.docker_container_exec:
    container: "{{ ludus_jenkins_container_name }}"
    command: jenkins-plugin-cli --plugins {{ ludus_jenkins_plugins | join(' ') }}
  register: plugin_result
  changed_when: "'Done' in plugin_result.stdout"

- name: Restart Jenkins after plugin install
  community.docker.docker_container:
    name: "{{ ludus_jenkins_container_name }}"
    restart: true

- name: Wait for Jenkins to come back up after plugin install
  ansible.builtin.uri:
    url: "http://localhost:{{ ludus_jenkins_http_port }}/login"
    method: GET
    status_code: 200
  register: jenkins_plugin_status
  retries: 30
  delay: 5
  until: jenkins_plugin_status.status == 200
